<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
    <style>
        label{
            width: 200px;
        }
    </style>
</head>
<body>

<h2>Add New Task</h2>

<form method="POST">
    {% csrf_token %}

    <label>Task Name</label>
    <input type="text" name="task_name">

    <br><br>

    <label>Description</label>
    <textarea name="description"></textarea>

    <br><br>

    <input type="submit" value="Save Task">
</form>

</body>
</html>
